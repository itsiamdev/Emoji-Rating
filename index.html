<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Rating System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favorite.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <h1>Rate this! 😊</h1>
        <div class="rating">
            <span class="emoji" data-rating="1">😢</span>
            <span class="emoji" data-rating="2">😟</span>
            <span class="emoji" data-rating="3">😐</span>
            <span class="emoji" data-rating="4">😊</span>
            <span class="emoji" data-rating="5">😍</span>
        </div>
        <div class="result">Your rating: <span id="selected-rating">None</span></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
